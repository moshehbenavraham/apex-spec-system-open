name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version info
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify ASCII encoding and LF line endings
        run: |
          echo "Checking for non-ASCII characters..."
          FAILURES=0
          while IFS= read -r f; do
            if LC_ALL=C grep -Pn '[^\x00-\x7F]' "$f" > /dev/null 2>&1; then
              echo "FAIL: non-ASCII in $f"
              LC_ALL=C grep -Pn '[^\x00-\x7F]' "$f"
              FAILURES=$((FAILURES + 1))
            fi
          done < <(find . -type f \( -name '*.md' -o -name '*.yml' -o -name '*.yaml' -o -name '*.sh' -o -name '*.json' \) -not -path './.git/*' -not -path './.spec_system/*' -not -path './commands/*' -not -path './apex-infinite-cli/*')
          echo "Checking for CRLF line endings..."
          while IFS= read -r f; do
            if grep -Pq '\r$' "$f" 2>/dev/null; then
              echo "FAIL: CRLF in $f"
              FAILURES=$((FAILURES + 1))
            fi
          done < <(find . -type f \( -name '*.md' -o -name '*.yml' -o -name '*.yaml' -o -name '*.sh' -o -name '*.json' \) -not -path './.git/*' -not -path './.spec_system/*' -not -path './commands/*' -not -path './apex-infinite-cli/*')
          if [[ "$FAILURES" -gt 0 ]]; then
            echo "::error::Found $FAILURES encoding violations"
            exit 1
          fi
          echo "All files pass encoding checks."

      - name: Verify version sync
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          SKILL_VERSION=$(grep -m1 '^version:' SKILL.md | sed 's/^version:[[:space:]]*//')
          README_VERSION=$(grep -oP '(?<=\*\*Version: )[^*]+' README.md | head -1)
          echo "Tag: $TAG_VERSION"
          echo "SKILL.md: $SKILL_VERSION"
          echo "README.md: $README_VERSION"
          FAILURES=0
          if [[ "$SKILL_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::SKILL.md version ($SKILL_VERSION) does not match tag ($TAG_VERSION)"
            FAILURES=$((FAILURES + 1))
          fi
          if [[ "$README_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::README.md version ($README_VERSION) does not match tag ($TAG_VERSION)"
            FAILURES=$((FAILURES + 1))
          fi
          if [[ "$FAILURES" -gt 0 ]]; then
            exit 1
          fi
          echo "Version sync verified."

      - name: Verify file inventory and script executability
        run: |
          FAILURES=0
          echo "Checking required files..."
          REQUIRED_FILES="SKILL.md README.md CHANGELOG.md LICENSE CONTRIBUTING.md agents/openai.yaml"
          for f in $REQUIRED_FILES; do
            if [[ ! -f "$f" ]]; then
              echo "::error::Missing required file: $f"
              FAILURES=$((FAILURES + 1))
            fi
          done
          echo "Checking reference files..."
          REF_COUNT=$(find references/ -name '*.md' -type f | wc -l)
          echo "Found $REF_COUNT reference files"
          if [[ "$REF_COUNT" -lt 22 ]]; then
            echo "::error::Expected at least 22 reference files, found $REF_COUNT"
            FAILURES=$((FAILURES + 1))
          fi
          echo "Checking scripts exist and are executable..."
          for script in scripts/analyze-project.sh scripts/check-prereqs.sh scripts/common.sh; do
            if [[ ! -f "$script" ]]; then
              echo "::error::Missing script: $script"
              FAILURES=$((FAILURES + 1))
            elif [[ ! -x "$script" ]]; then
              echo "::error::Script not executable: $script"
              FAILURES=$((FAILURES + 1))
            fi
          done
          if [[ "$FAILURES" -gt 0 ]]; then
            exit 1
          fi
          echo "File inventory and script checks passed."

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          body: |
            ## Apex Spec System v${{ steps.version.outputs.version }}

            A specification-driven workflow system for AI-assisted development.
            Break large projects into manageable 2-4 hour sessions with 12-25 tasks each.

            ### Installation

            **Method 1: Git Clone (Recommended)**

            ```bash
            git clone https://github.com/aiwithapex/apex-spec-system-open.git \
              ~/.agents/skills/apex-spec
            ```

            **Method 2: Skill Installer**

            ```bash
            codex install-skill https://github.com/aiwithapex/apex-spec-system-open.git
            ```

            **Method 3: Manual Download**

            ```bash
            mkdir -p ~/.agents/skills/apex-spec
            curl -L https://github.com/aiwithapex/apex-spec-system-open/archive/refs/heads/master.tar.gz \
              | tar xz --strip-components=1 -C ~/.agents/skills/apex-spec
            ```

            After installation, verify: `ls ~/.agents/skills/apex-spec/SKILL.md`

            ### Requirements

            - bash, git, jq (standard CLI tools)

            ### File Inventory

            | Directory | Contents |
            |-----------|----------|
            | `SKILL.md` | Root orchestrator and skill entry point |
            | `references/` | 26 command reference files |
            | `scripts/` | 3 bash utilities (analyze-project.sh, check-prereqs.sh, common.sh) |
            | `agents/` | Codex CLI metadata (openai.yaml) |
            | `docs/` | Architecture, development, onboarding, deployment guides |

            ### What's Changed

            See CHANGELOG.md and auto-generated changelog below.
